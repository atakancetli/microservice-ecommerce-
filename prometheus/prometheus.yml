global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'dispatcher'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['dispatcher:8080']
        labels:
          service: 'dispatcher'

  - job_name: 'auth-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['auth-service:8001']
        labels:
          service: 'auth'

  - job_name: 'product-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['product-service:8002']
        labels:
          service: 'product'

  - job_name: 'order-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['order-service:8003']
        labels:
          service: 'order'
